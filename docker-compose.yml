services:
  db:
    image: postgres:16-alpine
    container_name: evote-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evote
    volumes:
      - evote_pg_data:/var/lib/postgresql/data

volumes:
  evote_pg_data:
